services:
  namenode:
    image: apache/hadoop:3.3.6
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - HDFS_NAMENODE_OPTS=-Dhadoop.security.logger=INFO,RFAS
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: apache/hadoop:3.3.6
    container_name: datanode
    depends_on:
      - namenode
    environment:
      - HDFS_DATANODE_OPTS=-Dhadoop.security.logger=ERROR,RFAS
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - hadoop_datanode:/hadoop/dfs/data

  hive:
    image: apache/hive:4.0.0
    container_name: hive
    depends_on:
      - namenode
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionURL=jdbc:derby:memory:metastore_db;create=true

  spark:
    image: bitnami/spark:latest
    container_name: spark
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MODE=master
    depends_on:
      - namenode

volumes:
  hadoop_namenode:
  hadoop_datanode:
